<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Fruit Tac Toe</title>
</head>
<body>
    <div class="outerContainer hideDisplay">
        <div id="header">header</div>
        <div id="leftSideBar">left</div>
        <div id="mainContent">
            <div id="desktopUI">
                <div id="gamePlayContainer">
                    <div id="gridContainer">
                        <div class="turnContainer">
                            <span class="turnText highlightTurn">Player 1's Turn</span>
                            <span class="turnText">Player 2's turn</span>
                        </div>
                        <div id="gameGrid">
                            <div class="winningLine"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="rightSideBar">right</div>
    </div>
    <div class="secondContainer">
        <div class="header">Hello world</div>
        <div class="selectionContainer">
            <div class="playerBox">
                <img class="iconImg" src="heart.png"></img>
                <div class="playerTxt">Player 1</div>
            </div>
            <div class="vsText">VS</div>
            <div class="playerBox">
                <img class="iconImg" src="star.png"></img>
                <div class="playerTxt">Player 2</div>
            </div>
            <div class="choiceContainer">
                <div>Player 2:</div>
                <div class="circleContainer">
                    <div class="choiceCircle highlight">Player</div>
                    <div class="choiceCircle">Bot</div>
                </div>
            </div>
        </div>
    </div>






    <script src="index.js"></script>
</body>
</html>
