<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Fruit Tac Toe</title>
</head>
<body>
    <div id="outerContainer">
        <div id="header">header</div>
        <div id="leftSideBar">left</div>
        <div id="mainContent">
            <div id="desktopUI">
                <div id="gamePlayContainer">
                    <div id="gridContainer">
                        <div class="turnContainer">
                            <span class="turnText highlightTurn">Player 1's Turn</span>
                            <span class="turnText">Player 2's turn</span>
                        </div>
                        <div id="gameGrid">
                            <div class="winningLine"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="rightSideBar">right</div>
    </div>






    <script src="index.js"></script>
</body>
</html>
